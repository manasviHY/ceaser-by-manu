<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caesar Cipher - Cyberpunk Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        // SVG Icon Components
        const Copy = ({ size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <rect width="14" height="14" x="8" y="8" rx="2" ry="2"/>
                <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>
            </svg>
        );

        const Download = ({ size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" x2="12" y1="15" y2="3"/>
            </svg>
        );

        const Check = ({ size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M20 6 9 17l-5-5"/>
            </svg>
        );

        const Info = ({ size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 16v-4"/>
                <path d="M12 8h.01"/>
            </svg>
        );

        const X = ({ size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M18 6 6 18"/>
                <path d="m6 6 12 12"/>
            </svg>
        );

        function App() {
            const ALPHABETS = {
                english: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
                kannada: 'ಅಆಇಈಉಊಋಎಏಐಒಓಔಕಖಗಘಙಚಛಜಝಞಟಠಡಢಣತಥದಧನಪಫಬಭಮಯರಲವಶಷಸಹಳ',
                tamil: 'அஆஇஈஉஊஎஏஐஒஓஔகஙசஞடணதநனபமயரறலளழவஷஸஹ',
                telugu: 'అఆఇఈఉఊఋఎఏఐఒఓఔకఖగఘఙచఛజఝఞటఠడఢణతథదధనపఫబభమయరఱలళవశషసహ',
                hindi: 'अआइईउऊऋएऐओऔकखगघङचछजझञटठडढणतथदधनपफबभमयरलवशषसह',
                malayalam: 'അആഇഈഉഊഋഎഏഐഒഓഔകഖഗഘങചഛജഝഞടഠഡഢണതథദധനപഫബഭമയരറലളഴവശഷസഹ',
                bengali: 'অআইঈউঊঋএঐওঔকখগঘঙচছজঝঞটঠডঢণতথদধনপফবভমযরলশষসহ',
                gujarati: 'અઆઇઈઉઊઋએઐઓઔકખગઘઙચછજઝઞટઠડઢણતથદધનપફબભમયરલવશષસહ',
                greek: 'ΑΒΓΔΕΖΗΘΙΚΛΜΝΞΟΠΡΣΤΥΦΧΨΩ',
                russian: 'АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ',
                arabic: 'ابتثجحخدذرزسشصضطظعغفقكلمنهوي',
            };

            const [language, setLanguage] = useState('english');
            const [mode, setMode] = useState('encrypt');
            const [key, setKey] = useState('3');
            const [message, setMessage] = useState('');
            const [result, setResult] = useState('');
            const [copied, setCopied] = useState(false);
            const [caseStrategy, setCaseStrategy] = useState('upper');
            const [includeForeign, setIncludeForeign] = useState(true);
            const [showInfo, setShowInfo] = useState(false);

            const handleProcess = () => {
                const ALPHABET = ALPHABETS[language];
                const shiftKey = parseInt(key);
                let processedMessage = '';

                for (let i = 0; i < message.length; i++) {
                    const char = message[i];
                    const upperChar = char.toUpperCase();
                    const isLower = char === char.toLowerCase() && char !== char.toUpperCase();

                    if (ALPHABET.includes(upperChar)) {
                        let num = ALPHABET.indexOf(upperChar);
                        if (mode === 'encrypt') num += shiftKey;
                        else num -= shiftKey;

                        if (num >= ALPHABET.length) num = num - ALPHABET.length;
                        else if (num < 0) num += ALPHABET.length;

                        let resultChar = ALPHABET[num];
                        if (caseStrategy === 'preserve' && isLower) resultChar = resultChar.toLowerCase();
                        else if (caseStrategy === 'lower') resultChar = resultChar.toLowerCase();
                        processedMessage += resultChar;
                    } else if (ALPHABET.includes(char)) {
                        let num = ALPHABET.indexOf(char);
                        if (mode === 'encrypt') num += shiftKey;
                        else num -= shiftKey;

                        if (num >= ALPHABET.length) num = num - ALPHABET.length;
                        else if (num < 0) num += ALPHABET.length;
                        processedMessage += ALPHABET[num];
                    } else {
                        if (includeForeign) processedMessage += char;
                    }
                }
                setResult(processedMessage);
            };

            const isValidKey = () => {
                const numKey = parseInt(key);
                return !isNaN(numKey) && numKey >= 0 && numKey < ALPHABETS[language].length;
            };

            const handleCopy = async () => {
                try {
                    await navigator.clipboard.writeText(result);
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                } catch (err) {
                    console.error('Failed to copy:', err);
                }
            };

            const handleDownload = () => {
                const blob = new Blob([result], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${mode}-result.txt`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-black p-4" style={{background: 'radial-gradient(ellipse at top, rgba(88, 28, 135, 0.2), black, black)'}}>
                    <div className="w-full max-w-md bg-gray-900/80 backdrop-blur-xl rounded-2xl border border-purple-500/30 p-8 space-y-6 my-4" style={{boxShadow: '0 0 50px rgba(139, 92, 246, 0.3)'}}>
                        <div className="text-center relative">
                            <h1 className="text-4xl font-bold bg-gradient-to-r from-cyan-400 via-purple-400 to-pink-400 bg-clip-text text-transparent mb-2 tracking-wide">CAESAR CIPHER</h1>
                            <p className="text-cyan-300/80 text-sm tracking-wider uppercase">Encrypt or decrypt your messages</p>
                            <button onClick={() => setShowInfo(true)} className="absolute top-0 right-0 bg-cyan-500/20 hover:bg-cyan-500/30 border border-cyan-500/50 rounded-full p-2 transition-all" style={{boxShadow: '0 0 15px rgba(6, 182, 212, 0.4)'}}>
                                <Info size={20} className="text-cyan-400" />
                            </button>
                        </div>

                        {showInfo && (
                            <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                                <div className="bg-gray-900 border border-cyan-500/50 rounded-2xl max-w-lg w-full p-6 space-y-4 max-h-[90vh] overflow-y-auto" style={{boxShadow: '0 0 50px rgba(6, 182, 212, 0.3)'}}>
                                    <div className="flex justify-between items-start">
                                        <h2 className="text-2xl font-bold bg-gradient-to-r from-cyan-400 to-purple-400 bg-clip-text text-transparent">What is Caesar Cipher?</h2>
                                        <button onClick={() => setShowInfo(false)} className="bg-pink-500/20 hover:bg-pink-500/30 border border-pink-500/50 rounded-full p-1 transition-all">
                                            <X size={20} className="text-pink-400" />
                                        </button>
                                    </div>
                                    <div className="space-y-3 text-cyan-300/90 text-sm leading-relaxed">
                                        <p><strong className="text-cyan-400">Caesar Cipher</strong> is one of the oldest and simplest encryption techniques, named after Julius Caesar who used it to protect military messages.</p>
                                        <div className="bg-black/40 border border-purple-500/30 rounded-lg p-3">
                                            <p className="text-purple-300 font-semibold mb-2">How it works:</p>
                                            <p>Each letter in the text is shifted by a fixed number of positions in the alphabet. For example, with a shift of 3:</p>
                                            <p className="font-mono text-cyan-400 mt-2">A → D, B → E, C → F</p>
                                        </div>
                                        <div className="bg-black/40 border border-purple-500/30 rounded-lg p-3">
                                            <p className="text-purple-300 font-semibold mb-2">Common Uses:</p>
                                            <ul className="list-disc list-inside space-y-1">
                                                <li>Educational tool for learning cryptography</li>
                                                <li>Simple message obfuscation</li>
                                                <li>Puzzles and brain teasers</li>
                                                <li>ROT13 for hiding spoilers online</li>
                                                <li>Historical cryptography demonstrations</li>
                                            </ul>
                                        </div>
                                        <div className="bg-black/40 border border-pink-500/30 rounded-lg p-3">
                                            <p className="text-pink-300 font-semibold mb-2">⚠️ Security Note:</p>
                                            <p>Caesar Cipher is <strong>NOT secure</strong> for protecting sensitive data. It's easily broken and should only be used for educational purposes or casual message hiding.</p>
                                        </div>
                                        <p className="text-xs text-gray-500 italic">Fun fact: ROT13 (shift of 13) is still used today in online forums to hide spoilers and punchlines!</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-cyan-400 mb-2 uppercase tracking-wider">Language</label>
                                <select value={language} onChange={(e) => setLanguage(e.target.value)} className="w-full px-4 py-3 bg-gray-800 border border-purple-500/50 text-cyan-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition-all cursor-pointer">
                                    <option value="english">English</option>
                                    <option value="kannada">ಕನ್ನಡ (Kannada)</option>
                                    <option value="tamil">தமிழ் (Tamil)</option>
                                    <option value="telugu">తెలుగు (Telugu)</option>
                                    <option value="hindi">हिन्दी (Hindi)</option>
                                    <option value="malayalam">മലയാളം (Malayalam)</option>
                                    <option value="bengali">বাংলা (Bengali)</option>
                                    <option value="gujarati">ગુજરાતી (Gujarati)</option>
                                    <option value="greek">Ελληνικά (Greek)</option>
                                    <option value="russian">Русский (Russian)</option>
                                    <option value="arabic">العربية (Arabic)</option>
                                </select>
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-cyan-400 mb-2 uppercase tracking-wider">Mode</label>
                                <div className="flex gap-4">
                                    <button onClick={() => setMode('encrypt')} className={`flex-1 py-3 px-4 rounded-lg font-medium transition-all uppercase tracking-wider ${mode === 'encrypt' ? 'bg-gradient-to-r from-cyan-500 to-blue-500 text-white' : 'bg-gray-800 text-gray-400 hover:bg-gray-700 border border-gray-700'}`} style={mode === 'encrypt' ? {boxShadow: '0 0 20px rgba(6, 182, 212, 0.5)'} : {}}>Encrypt</button>
                                    <button onClick={() => setMode('decrypt')} className={`flex-1 py-3 px-4 rounded-lg font-medium transition-all uppercase tracking-wider ${mode === 'decrypt' ? 'bg-gradient-to-r from-pink-500 to-purple-500 text-white' : 'bg-gray-800 text-gray-400 hover:bg-gray-700 border border-gray-700'}`} style={mode === 'decrypt' ? {boxShadow: '0 0 20px rgba(236, 72, 153, 0.5)'} : {}}>Decrypt</button>
                                </div>
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-cyan-400 mb-2 uppercase tracking-wider">Case Strategy</label>
                                <div className="grid grid-cols-3 gap-2">
                                    {['upper', 'lower', 'preserve'].map((cs) => (
                                        <button key={cs} onClick={() => setCaseStrategy(cs)} className={`py-2 px-3 rounded-lg font-medium transition-all text-sm uppercase tracking-wider ${caseStrategy === cs ? 'bg-gradient-to-r from-cyan-500 to-blue-500 text-white' : 'bg-gray-800 text-gray-400 hover:bg-gray-700 border border-gray-700'}`} style={caseStrategy === cs ? {boxShadow: '0 0 15px rgba(6, 182, 212, 0.4)'} : {}}>
                                            {cs === 'preserve' ? 'Keep' : cs}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="flex items-center justify-between bg-gray-800/50 border border-purple-500/30 rounded-lg p-3">
                                <label className="text-sm font-medium text-cyan-400 uppercase tracking-wider">Include Special Characters</label>
                                <button onClick={() => setIncludeForeign(!includeForeign)} className={`relative w-14 h-7 rounded-full transition-all ${includeForeign ? 'bg-gradient-to-r from-cyan-500 to-blue-500' : 'bg-gray-700'}`} style={includeForeign ? {boxShadow: '0 0 15px rgba(6, 182, 212, 0.4)'} : {}}>
                                    <div className={`absolute top-1 left-1 w-5 h-5 bg-white rounded-full transition-transform ${includeForeign ? 'translate-x-7' : 'translate-x-0'}`} />
                                </button>
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-cyan-400 mb-2 uppercase tracking-wider">Key (0 to {ALPHABETS[language].length - 1})</label>
                                <input type="number" value={key} onChange={(e) => setKey(e.target.value)} min="0" max={ALPHABETS[language].length - 1} className="w-full px-4 py-3 bg-gray-800 border border-purple-500/50 text-cyan-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition-all" />
                                {!isValidKey() && key !== '' && <p className="text-pink-400 text-sm mt-1">Please enter a number between 0 and {ALPHABETS[language].length - 1}</p>}
                            </div>

                            <div>
                                <div className="flex justify-between items-center mb-2">
                                    <label className="text-sm font-medium text-cyan-400 uppercase tracking-wider">Message</label>
                                    <span className="text-xs text-purple-400 font-mono">{message.length} characters</span>
                                </div>
                                <textarea value={message} onChange={(e) => setMessage(e.target.value)} placeholder="Enter your message here..." rows={4} className="w-full px-4 py-3 bg-gray-800 border border-purple-500/50 text-cyan-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 resize-none transition-all placeholder:text-gray-600" />
                            </div>

                            <button onClick={handleProcess} disabled={!isValidKey() || !message} className="w-full bg-gradient-to-r from-purple-600 via-pink-500 to-cyan-500 text-white py-3 px-4 rounded-lg font-bold disabled:bg-gray-700 disabled:cursor-not-allowed disabled:shadow-none transition-all uppercase tracking-wider" style={{boxShadow: '0 0 30px rgba(139, 92, 246, 0.6)'}}>
                                {mode === 'encrypt' ? 'Encrypt' : 'Decrypt'} Message
                            </button>

                            {result && (
                                <div className="bg-gray-900/50 rounded-lg p-4 border border-cyan-500/50 space-y-3" style={{boxShadow: '0 0 25px rgba(6, 182, 212, 0.2)'}}>
                                    <div className="flex justify-between items-center">
                                        <label className="text-sm font-medium text-cyan-400 uppercase tracking-wider">Result</label>
                                        <span className="text-xs text-purple-400 font-mono">{result.length} characters</span>
                                    </div>
                                    <p className="text-cyan-300 break-words font-mono bg-black/50 p-4 rounded border border-purple-500/30 shadow-inner">{result}</p>
                                    <div className="flex gap-2">
                                        <button onClick={handleCopy} className="flex-1 flex items-center justify-center gap-2 bg-gradient-to-r from-cyan-600 to-blue-600 text-white py-2 px-4 rounded-lg font-medium transition-all uppercase tracking-wide" style={{boxShadow: '0 0 20px rgba(6, 182, 212, 0.5)'}}>
                                            {copied ? <><Check size={18} />Copied!</> : <><Copy size={18} />Copy</>}
                                        </button>
                                        <button onClick={handleDownload} className="flex-1 flex items-center justify-center gap-2 bg-gradient-to-r from-pink-600 to-purple-600 text-white py-2 px-4 rounded-lg font-medium transition-all uppercase tracking-wide" style={{boxShadow: '0 0 20px rgba(236, 72, 153, 0.5)'}}>
                                            <Download size={18} />Download
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
